<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Memory Match ♥ Stop 6</title>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Nunito:wght@400;700;800&display=swap" rel="stylesheet">
<style>
:root{--bg:#fef9f0;--wood:#7a4a2a;--heart:#e8174a;--yellow:#ffd93d;--green:#4caf50;}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--bg);font-family:'Nunito',sans-serif;}

.top-bar{width:100%;max-width:700px;display:flex;align-items:center;justify-content:space-between;padding:14px 16px;border-bottom:3px solid var(--wood);margin:0 auto 12px;}
.back-link{font-family:'Press Start 2P',monospace;font-size:7px;color:var(--wood);text-decoration:none;}
.game-title{font-family:'Press Start 2P',monospace;font-size:12px;color:var(--wood);}
.stop-pill{font-family:'Press Start 2P',monospace;font-size:7px;background:var(--heart);color:white;padding:5px 10px;border-radius:12px;}

.stats-row{display:flex;gap:16px;justify-content:center;margin-bottom:12px;}
.stat-box{background:white;border:3px solid var(--wood);border-radius:8px;padding:8px 16px;text-align:center;box-shadow:2px 2px 0 rgba(0,0,0,.1);}
.stat-val{font-family:'Press Start 2P',monospace;font-size:16px;color:var(--wood);display:block;margin-bottom:2px;}
.stat-val.danger{color:var(--heart);}
.stat-label{font-family:'Press Start 2P',monospace;font-size:6px;color:#888;}

.instructions{max-width:660px;font-size:12px;color:#5a3a1a;background:#fff3e0;border:2px solid #ffcc80;border-radius:8px;padding:10px 16px;margin:0 auto 14px;line-height:1.7;text-align:center;}
.instructions strong{color:var(--heart);}

#msg{text-align:center;font-family:'Press Start 2P',monospace;font-size:8px;color:var(--heart);min-height:22px;padding:4px;line-height:1.8;margin-bottom:6px;}

#grid{
  display:grid;
  grid-template-columns:repeat(5,1fr);
  gap:10px;
  padding:0 16px 40px;
  max-width:700px;
  margin:0 auto;
}

.card{aspect-ratio:0.7;cursor:pointer;position:relative;perspective:800px;}
.card-inner{position:absolute;inset:0;transform-style:preserve-3d;transition:transform .4s ease;}
.card.flipped .card-inner,.card.matched .card-inner{transform:rotateY(180deg);}
.card-face{position:absolute;inset:0;border-radius:8px;backface-visibility:hidden;border:2px solid var(--wood);overflow:hidden;display:flex;align-items:center;justify-content:center;}
.card-back{background:linear-gradient(135deg,var(--heart),#ff4080);}
.card-back::after{content:'♥';font-size:28px;color:rgba(255,255,255,.8);}
.card-front{transform:rotateY(180deg);background:#f5e8d8;}
.card-front img{width:100%;height:100%;object-fit:cover;border-radius:7px;display:block;}
.card.matched .card-face{border-color:var(--green);}
.card.matched .card-back{filter:brightness(.5);}
.card.matched .card-front::after{content:'✓';position:absolute;top:4px;right:6px;font-size:14px;color:var(--green);font-weight:900;z-index:2;}
.card.shake .card-inner{animation:shake .4s ease;}
@keyframes shake{0%,100%{transform:rotateY(180deg)}25%{transform:rotateY(180deg) translateX(-5px)}75%{transform:rotateY(180deg) translateX(5px)}}

.result-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.8);z-index:200;align-items:center;justify-content:center;padding:20px;}
.result-overlay.show{display:flex;}
.result-box{background:var(--bg);border:5px solid var(--wood);border-radius:4px;padding:28px 24px;max-width:400px;width:100%;text-align:center;box-shadow:0 0 0 2px var(--yellow),8px 8px 0 rgba(0,0,0,.5);animation:popIn .4s cubic-bezier(.34,1.56,.64,1);position:relative;}
@keyframes popIn{from{transform:scale(.5);opacity:0}to{transform:scale(1);opacity:1}}
.re{font-size:52px;display:block;margin-bottom:12px;}
h2{font-family:'Press Start 2P',monospace;font-size:11px;color:var(--wood);margin-bottom:12px;line-height:1.8;}
.result-box p{font-size:13px;color:#5a3a1a;line-height:1.8;margin-bottom:16px;}
.r-btn{display:inline-block;background:var(--heart);color:white;font-family:'Press Start 2P',monospace;font-size:9px;padding:12px 18px;border:none;border-radius:4px;cursor:pointer;text-decoration:none;box-shadow:3px 3px 0 #a00;transition:all .1s;margin:4px;}
.r-btn:hover{transform:translateY(-2px);}
.r-btn-sec{background:var(--wood);box-shadow:3px 3px 0 #3a1a00;}
.result-close-btn{position:absolute;top:10px;right:14px;background:none;border:none;font-size:20px;cursor:pointer;color:#888;}
.result-close-btn:hover{color:#333;}
.step-closer{font-family:'Press Start 2P',monospace;font-size:7px;color:#e8174a;background:#fff0f5;border:2px solid #ffb3cc;border-radius:8px;padding:10px 14px;margin-bottom:14px;line-height:1.9;}
</style>
</head>

<div class="top-bar">
  <a href="index.html" class="back-link">← MAP</a>
  <div class="game-title">MEMORY MATCH</div>
  <div class="stop-pill">STOP 6</div>
</div>

<div class="stats-row">

  <div class="stat-box"><span class="stat-val" id="pairsVal">0/10</span><span class="stat-label">PAIRS</span></div>
</div>

<div class="instructions">
  Match all <strong>10 pairs</strong> in <strong>1:00</strong> — unlimited moves! These are photos of us 💕 Find the matches, Babes!
</div>

<div id="msg"></div>
<div id="grid"></div>

<div class="result-overlay" id="resultOverlay">
  <div class="result-box">
    <button class="result-close-btn" onclick="closeResult()">✕</button>
    <span class="re" id="rEmoji">🎊</span>
    <h2 id="rTitle"></h2>
    <div id="stepCloser" class="step-closer" style="display:none">🗺️ One step closer to your love letter — keep going!</div>
    <p id="rMsg"></p>
    <div id="winBtns" style="display:none;flex-wrap:wrap;gap:8px;justify-content:center;margin-top:8px;">
      <a href="index.html?done=6" class="r-btn">Back to Map →</a>
      <button class="r-btn r-btn-sec" onclick="closeResult()">Stay &amp; Look 👀</button>
    </div>
    <div id="loseBtns" style="display:none;flex-wrap:wrap;gap:8px;justify-content:center;margin-top:8px;">
      <button class="r-btn r-btn-sec" onclick="resetGame()">Try Again</button>
      <button class="r-btn" onclick="closeResult()">Keep Looking 👀</button>
    </div>
  </div>
</div>

function shuffle(a){for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}

let cards=[],flipped=[],matched=[],moves=0,timeLeft=60,timerInterval=null,canFlip=true,started=false;

function init(){
  cards=shuffle([...PAIRS,...PAIRS].map((p,i)=>({...p,uid:i})));
  flipped=[];matched=[];moves=0;timeLeft=60;canFlip=true;started=false;
  clearInterval(timerInterval);
  document.getElementById('timerVal').textContent='1:00';
  document.getElementById('timerVal').classList.remove('danger');
  document.getElementById('pairsVal').textContent='0/10';
  document.getElementById('msg').textContent='Click any card to start!';
  renderGrid();
}

function renderGrid(){
  const g=document.getElementById('grid');
  g.innerHTML='';
  cards.forEach((card,idx)=>{
    const el=document.createElement('div');
    el.className='card'+(matched.includes(card.id)?' flipped matched':'');
    el.id='card'+idx;
    el.onclick=()=>flipCard(idx);
    const inner=document.createElement('div');
    inner.className='card-inner';
    const back=document.createElement('div');
    back.className='card-face card-back';
    const front=document.createElement('div');
    front.className='card-face card-front';
    const img=document.createElement('img');
    img.src=card.img;
    img.alt=card.label;
    front.appendChild(img);
    inner.appendChild(back);
    inner.appendChild(front);
    el.appendChild(inner);
    g.appendChild(el);
  });
}

function flipCard(idx){
  if(!canFlip||matched.includes(cards[idx].id)||flipped.includes(idx)||flipped.length>=2)return;
  if(!started){
    started=true;
    timerInterval=setInterval(tick,1000);
    document.getElementById('msg').textContent='Go! Find the matches! 💕';
  }
  flipped.push(idx);
  document.getElementById('card'+idx).classList.add('flipped');
  if(flipped.length===2){moves++;canFlip=false;checkMatch();}
}

function checkMatch(){
  const [a,b]=flipped;
  if(cards[a].id===cards[b].id){
    matched.push(cards[a].id);
    document.getElementById('card'+a).classList.add('matched');
    document.getElementById('card'+b).classList.add('matched');
    document.getElementById('pairsVal').textContent=matched.length+'/10';
    showMsg(['Match! 💕','Found them! 🎉','Yes!! 🥰','That\'s us! 💖','Perfect! ✨'][Math.floor(Math.random()*5)]);
    flipped=[];canFlip=true;
    if(matched.length===PAIRS.length){clearInterval(timerInterval);setTimeout(()=>showResult(true),600);}
  } else {
    showMsg('Not a match — keep going! 🔍');
    setTimeout(()=>{
      document.getElementById('card'+flipped[0]).classList.remove('flipped');
      document.getElementById('card'+flipped[1]).classList.remove('flipped');
      flipped=[];canFlip=true;
    },900);
  }
}

function tick(){
  timeLeft--;
  const el=document.getElementById('timerVal');
  const m=Math.floor(timeLeft/60),s=String(timeLeft%60).padStart(2,'0');
  el.textContent=m+':'+s;
  if(timeLeft<=10)el.classList.add('danger');
  if(timeLeft<=0){clearInterval(timerInterval);showResult(false);}
}

function showResult(won){
  document.getElementById('rEmoji').textContent=won?'🎊':'⏰';
  document.getElementById('rTitle').textContent=won?'All Matched! ♥':'Time\'s Up!';
  document.getElementById('rMsg').textContent=won
    ?'You matched all our memories! You remember every moment we\'ve shared 💕'
    :'You got '+matched.length+'/10 pairs — our memories are worth remembering 💕';
  document.getElementById('stepCloser').style.display=won?'block':'none';
  document.getElementById('winBtns').style.display=won?'flex':'none';
  document.getElementById('loseBtns').style.display=won?'none':'flex';
  document.getElementById('resultOverlay').classList.add('show');
}

function closeResult(){document.getElementById('resultOverlay').classList.remove('show');}
function resetGame(){document.getElementById('resultOverlay').classList.remove('show');init();}

let msgTO;
function showMsg(m){const el=document.getElementById('msg');el.textContent=m;clearTimeout(msgTO);msgTO=setTimeout(()=>el.textContent='',2500);}

init();
</script>
