<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Photo Match ♥ Stop 4</title>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Nunito:wght@400;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #fdf6e3;
    --wood: #8B5E3C;
    --heart: #e91e63;
    --match: #5a9e32;
    --card-back: linear-gradient(135deg, #f48fb1, #e91e63);
  }
  * { margin:0;padding:0;box-sizing:border-box; }
  body {
    background: linear-gradient(135deg, #87ceeb 0%, #c8e6c9 50%, #7ec850 100%);
    min-height:100vh;
    font-family:'Nunito',sans-serif;
    display:flex; flex-direction:column; align-items:center;
    padding:20px;
  }
  .game-header { text-align:center; margin-bottom:14px; }
  .back-btn { display:inline-block; font-family:'Press Start 2P',monospace; font-size:7px; color:var(--wood); text-decoration:none; background:var(--bg); border:2px solid var(--wood); padding:6px 12px; border-radius:6px; margin-bottom:10px; box-shadow:2px 2px 0 rgba(0,0,0,0.2); }
  .stop-badge { font-family:'Press Start 2P',monospace; font-size:9px; color:white; background:var(--heart); padding:6px 14px; border-radius:20px; display:inline-block; margin-bottom:8px; box-shadow:2px 2px 0 #a00030; }
  h1 { font-family:'Press Start 2P',monospace; font-size:clamp(12px,3vw,20px); color:var(--wood); margin-bottom:6px; }
  .hint { font-size:13px; color:#5a3a1a; background:rgba(255,255,255,0.7); padding:8px 16px; border-radius:20px; font-weight:700; display:inline-block; }

  .game-panel {
    background:var(--bg); border:3px solid var(--wood); border-radius:16px; padding:20px;
    box-shadow:5px 5px 0 rgba(0,0,0,0.2); width:100%; max-width:480px;
  }

  .stats-row {
    display:flex; justify-content:space-between; align-items:center;
    margin-bottom:14px;
    font-family:'Press Start 2P',monospace; font-size:8px; color:var(--wood);
  }
  .stat { background:white; border:2px solid var(--wood); border-radius:8px; padding:6px 12px; }

  /* Card grid */
  #cardGrid {
    display:grid;
    grid-template-columns: repeat(4, 1fr);
    gap:8px;
    margin-bottom:14px;
  }

  .card {
    aspect-ratio: 1;
    border-radius:10px;
    cursor:pointer;
    position:relative;
    transform-style:preserve-3d;
    transition:transform 0.4s;
    border:3px solid var(--wood);
    box-shadow:2px 2px 0 rgba(0,0,0,0.15);
  }
  .card.flipped { transform:rotateY(180deg); }
  .card.matched { transform:rotateY(180deg); animation:match-pulse 0.5s ease; border-color:var(--match); }
  @keyframes match-pulse { 0%,100%{transform:rotateY(180deg) scale(1)} 50%{transform:rotateY(180deg) scale(1.1)} }

  .card-face {
    position:absolute; inset:0;
    border-radius:8px;
    backface-visibility:hidden;
    display:flex; align-items:center; justify-content:center;
    overflow:hidden;
  }
  .card-back {
    background:var(--card-back);
    font-size:24px;
  }
  .card-back::after { content:'♥'; font-size:28px; color:rgba(255,255,255,0.8); }
  .card-front {
    transform:rotateY(180deg);
    background:#f0f0f0;
    font-size:32px;
    flex-direction:column;
    gap:4px;
  }

  /* Photo placeholders */
  .photo-placeholder {
    width:100%; height:100%;
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    border-radius:8px;
    font-size:28px;
    color:white;
    font-weight:800;
    font-family:'Nunito',sans-serif;
    font-size:10px;
    text-align:center;
    padding:4px;
  }
  .photo-placeholder .photo-emoji { font-size:24px; margin-bottom:2px; }
  .photo-placeholder .photo-label { font-family:'Press Start 2P',monospace; font-size:5px; opacity:0.9; }

  .matched-indicator {
    position:absolute; top:-8px; right:-8px;
    background:var(--match); color:white;
    border-radius:50%; width:20px; height:20px;
    display:flex; align-items:center; justify-content:center;
    font-size:10px; z-index:10;
    animation:pop-in 0.3s cubic-bezier(0.34,1.56,0.64,1);
    border:2px solid white;
  }
  @keyframes pop-in { from{transform:scale(0)} to{transform:scale(1)} }

  #message { text-align:center; font-family:'Press Start 2P',monospace; font-size:8px; color:var(--heart); min-height:20px; line-height:1.8; }

  /* Result overlay */
  .result-overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.75); z-index:50; align-items:center; justify-content:center; padding:20px; }
  .result-overlay.active { display:flex; }
  .result-box { background:var(--bg); border:4px solid var(--wood); border-radius:16px; padding:32px 24px; text-align:center; max-width:360px; box-shadow:8px 8px 0 rgba(0,0,0,0.3); animation:pop-in 0.4s cubic-bezier(0.34,1.56,0.64,1); }
  .result-box .emoji { font-size:48px; margin-bottom:12px; }
  .result-box h2 { font-family:'Press Start 2P',monospace; font-size:10px; color:var(--wood); margin-bottom:12px; line-height:1.8; }
  .result-box p { color:#5a3a1a; margin-bottom:20px; line-height:1.7; font-size:13px; }
  .rbtn { display:inline-block; background:var(--heart); color:white; font-family:'Press Start 2P',monospace; font-size:8px; padding:12px 20px; border:none; border-radius:8px; cursor:pointer; box-shadow:3px 3px 0 #a00030; text-decoration:none; margin:4px; transition:all 0.1s; }
  .rbtn:hover { transform:translateY(-2px); }
  .rbtn-wood { background:var(--wood); box-shadow:3px 3px 0 #3a2010; }
</style>
</head>
<body>

<div class="game-header">
  <a href="index.html" class="back-btn">← Back to Map</a><br>
  <span class="stop-badge">📸 Stop 4 of 5</span>
  <h1>PHOTO MATCH ♥</h1>
  <div class="hint">Find the matching pairs from our memories 📸</div>
</div>

<div class="game-panel">
  <div class="stats-row">
    <div class="stat">Moves: <span id="moves">0</span></div>
    <div class="stat">Pairs: <span id="pairsFound">0</span>/8</div>
    <div class="stat">⏱ <span id="timer">0:00</span></div>
  </div>
  <div id="cardGrid"></div>
  <div id="message"></div>
</div>

<div class="result-overlay" id="resultOverlay">
  <div class="result-box">
    <div class="emoji">📸</div>
    <h2>All Pairs Found! ♥</h2>
    <p id="resultMsg">You remember every moment! That's why I love you 💕</p>
    <a href="index.html?completed=4" class="rbtn">Next Stop →</a>
    <button class="rbtn rbtn-wood" onclick="resetGame()">Play Again</button>
  </div>
</div>

<script>
// 8 pairs = 16 cards
// Replace emoji/colors with actual photos later!
const PAIRS = [
  { id:1, emoji:'🗾', label:'Japan Trip', bg:'linear-gradient(135deg,#ff6b6b,#ee0979)', hint:'Our Japan adventure' },
  { id:2, emoji:'🏖️', label:'Cancun', bg:'linear-gradient(135deg,#43e97b,#38f9d7)', hint:'Cancun vibes' },
  { id:3, emoji:'🌊', label:'Malibu', bg:'linear-gradient(135deg,#4facfe,#00f2fe)', hint:'Malibu sunset' },
  { id:4, emoji:'🍕', label:'Chicago', bg:'linear-gradient(135deg,#f7971e,#ffd200)', hint:'Chicago deep dish' },
  { id:5, emoji:'🎃', label:'Halloween', bg:'linear-gradient(135deg,#f093fb,#f5576c)', hint:'Halloween costumes' },
  { id:6, emoji:'💝', label:'Our Love', bg:'linear-gradient(135deg,#ee0979,#ff6a00)', hint:'Just us 💕' },
  { id:7, emoji:'🌸', label:'Date Night', bg:'linear-gradient(135deg,#a18cd1,#fbc2eb)', hint:'A special night' },
  { id:8, emoji:'🏠', label:'Home', bg:'linear-gradient(135deg,#84fab0,#8fd3f4)', hint:'Our place' },
];

let cards = [];
let flipped = [];
let matched = [];
let moves = 0;
let timerInterval;
let seconds = 0;
let canFlip = true;

function shuffle(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}

function init() {
  cards = shuffle([...PAIRS, ...PAIRS].map((p, i) => ({...p, uid: i})));
  flipped = []; matched = []; moves = 0; seconds = 0; canFlip = true;
  clearInterval(timerInterval);
  timerInterval = setInterval(updateTimer, 1000);
  document.getElementById('moves').textContent = 0;
  document.getElementById('pairsFound').textContent = 0;
  document.getElementById('timer').textContent = '0:00';
  document.getElementById('message').textContent = '';
  renderGrid();
}

function renderGrid() {
  const grid = document.getElementById('cardGrid');
  grid.innerHTML = '';
  cards.forEach((card, idx) => {
    const el = document.createElement('div');
    el.className = 'card' + (matched.includes(card.id) ? ' matched flipped' : '');
    el.id = `card-${idx}`;
    el.onclick = () => flipCard(idx);

    // Back face
    const back = document.createElement('div');
    back.className = 'card-face card-back';

    // Front face (photo placeholder)
    const front = document.createElement('div');
    front.className = 'card-face card-front';
    const placeholder = document.createElement('div');
    placeholder.className = 'photo-placeholder';
    placeholder.style.background = card.bg;
    placeholder.innerHTML = `<span class="photo-emoji">${card.emoji}</span><span class="photo-label">${card.label}</span>`;
    front.appendChild(placeholder);

    if (matched.includes(card.id)) {
      const indicator = document.createElement('div');
      indicator.className = 'matched-indicator';
      indicator.textContent = '✓';
      el.appendChild(indicator);
    }

    el.appendChild(back);
    el.appendChild(front);
    grid.appendChild(el);
  });
}

function flipCard(idx) {
  if (!canFlip) return;
  if (matched.includes(cards[idx].id)) return;
  if (flipped.includes(idx)) return;
  if (flipped.length >= 2) return;

  flipped.push(idx);
  document.getElementById(`card-${idx}`).classList.add('flipped');

  if (flipped.length === 2) {
    moves++;
    document.getElementById('moves').textContent = moves;
    canFlip = false;
    checkMatch();
  }
}

function checkMatch() {
  const [a, b] = flipped;
  if (cards[a].id === cards[b].id) {
    // Match!
    matched.push(cards[a].id);
    document.getElementById(`card-${a}`).classList.add('matched');
    document.getElementById(`card-${b}`).classList.add('matched');

    const messages = [
      'Match! 🌸', 'Found them! 💕', 'Yes!! 🎉', 'You remember! 💖',
      'Perfect! ✨', 'Aww! 🥰', 'Love this one! 💝', 'That\'s us! 💕'
    ];
    showMessage(messages[Math.floor(Math.random() * messages.length)]);

    // Add checkmark
    [a, b].forEach(i => {
      const card = document.getElementById(`card-${i}`);
      const indicator = document.createElement('div');
      indicator.className = 'matched-indicator';
      indicator.textContent = '✓';
      card.appendChild(indicator);
    });

    document.getElementById('pairsFound').textContent = matched.length;
    flipped = [];
    canFlip = true;

    if (matched.length === PAIRS.length) {
      clearInterval(timerInterval);
      setTimeout(() => showResult(), 800);
    }
  } else {
    // No match
    setTimeout(() => {
      document.getElementById(`card-${a}`).classList.remove('flipped');
      document.getElementById(`card-${b}`).classList.remove('flipped');
      flipped = [];
      canFlip = true;
      showMessage('Not a match — try again! 🔍');
    }, 900);
  }
}

function showResult() {
  const mins = Math.floor(seconds / 60);
  const secs = seconds % 60;
  document.getElementById('resultMsg').textContent =
    `You matched all 8 pairs in ${moves} moves and ${mins}:${String(secs).padStart(2,'0')}! You remember every moment — that's why I love you 💕`;
  document.getElementById('resultOverlay').classList.add('active');
}

function updateTimer() {
  seconds++;
  const mins = Math.floor(seconds / 60);
  const secs = seconds % 60;
  document.getElementById('timer').textContent = `${mins}:${String(secs).padStart(2,'0')}`;
}

let msgTO;
function showMessage(msg) {
  const el = document.getElementById('message');
  el.textContent = msg;
  clearTimeout(msgTO);
  msgTO = setTimeout(() => el.textContent = '', 2000);
}

function resetGame() {
  document.getElementById('resultOverlay').classList.remove('active');
  init();
}

init();
</script>
</body>
</html>
